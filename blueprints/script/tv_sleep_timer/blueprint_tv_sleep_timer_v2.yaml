blueprint:
  name: TV Sleep Timer
  description: >
    Schaltet den Fernseher nach einer einstellbaren Zeit automatisch aus.
    Stelle die Wartezeit im input_number Helper ein und starte das Script
    manuell – es läuft erst, wenn du es auslöst.
  domain: script
  input:
    tv_entity:
      name: Fernseher
      description: Der TV / Media Player, der ausgeschaltet werden soll.
      selector:
        entity:
          filter:
            - domain: media_player
    timer_minutes:
      name: Wartezeit (Minuten)
      description: Ein input_number Helper mit der Wartezeit in Minuten.
      selector:
        entity:
          filter:
            - domain: input_number
  source_url: https://github.com/marque0/HA-Blueprints/blob/main/blueprints/script/tv_sleep_timer/blueprint_tv_sleep_timer_v2.yaml

mode: restart

variables:
  minutes_helper: !input timer_minutes
  tv: !input tv_entity
  minutes: "{{ states(minutes_helper) | float(0) }}"

sequence:
  - alias: "Nur fortfahren, wenn Wartezeit > 0"
    condition:
      - condition: template
        value_template: "{{ minutes > 0 }}"

  - alias: "Warte die eingestellte Zeit"
    delay:
      minutes: "{{ minutes | int(0) }}"

  - alias: "Fernseher ausschalten"
    service: media_player.turn_off
    target:
      entity_id: "{{ tv }}"
